<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeXHub</title>

<style>
  *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
  }

  body{
    background: linear-gradient(180deg, #020617, #0f172a);
    color: white;
  }

  /* NAVBAR */
  header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 15px 20px;
    background: #020617;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 1px solid #1f2937;
  }

  .logo{
    font-size: 26px;
    font-weight: bold;
    color: #facc15;
  }

  .profile{
    font-size: 20px;
  }

  /* CONTAINER */
  .container{
    padding: 20px;
    max-width: 1000px;
    margin: auto;
  }

  h1{
    font-size: 22px;
    margin-bottom: 15px;
  }

  h1 span{
    color: #facc15;
  }

  /* GRID */
  .anime-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
  }

  /* CARD (POSTER STYLE) */
  .card{
    border-radius: 15px;
    overflow: hidden;
    border: 1px solid #1f2937;
    position: relative;
    transition: 0.3s;
  }

  .card:hover{
    transform: translateY(-5px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    border-color: #facc15;
  }

  .card img{
    width: 100%;
    height: 280px;
    object-fit: cover;
    display: block;
  }

  /* REMOVE EXTRA SPACE */
  .card-content{
    display: none;
  }

  .tag, .episode{
    position: absolute;
    background: #facc15;
    color: black;
    font-size: 11px;
    font-weight: bold;
    padding: 4px 8px;
    border-radius: 8px;
  }

  .tag{
    top: 10px;
    left: 10px;
  }

  .episode{
    bottom: 10px;
    left: 10px;
  }

  /* FLOAT BUTTON */
  .floating{
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #6366f1;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    cursor: pointer;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  }

  .floating:hover{
    transform: scale(1.1);
  }

</style>
</head>

<body>

<header>
  <div class="logo">AnimeXHub</div>
  <div class="profile">👤</div>
</header>

<div class="container">
  <h1>Results for <span>Anime</span></h1>

  <div class="anime-grid">

    <a href="drstone.html" style="text-decoration:none; color:white;">
      <div class="card">
        <img src="dr.stone.jpeg" alt="Dr Stone">
        <div class="tag">Multi-Audio</div>
        <div class="episode">S4-EP26</div>
      </div>
    </a>

  </div>
</div>

<div class="floating">📺</div>

</body>
</html>
