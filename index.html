<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AnimeXHub</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, sans-serif;
}

body{
  background:#0b1220;
  color:white;
}

/* NAVBAR */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:12px 20px;
  background:#020617;
  border-bottom:1px solid #1f2937;
}

.logo{
  color:#facc15;
  font-size:22px;
  font-weight:bold;
}

/* CONTAINER */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* TITLE */
h1{
  font-size:20px;
  margin-bottom:15px;
}

h1 span{
  color:#facc15;
}

/* GRID FIX */
.anime-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 160px));
  justify-content:center;   /* 🔥 CENTER FIX */
  gap:15px;
}

/* CARD */
.card{
  width:100%;
  border-radius:12px;
  overflow:hidden;
  position:relative;
  border:1px solid #1f2937;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-5px);
  border-color:#facc15;
}

/* IMAGE FIX */
.card img{
  width:100%;
  height:260px;
  object-fit:cover; /* 🔥 IMPORTANT */
}

/* TAGS */
.tag, .episode{
  position:absolute;
  background:#facc15;
  color:black;
  font-size:11px;
  padding:4px 8px;
  border-radius:6px;
  font-weight:bold;
}

.tag{
  top:8px;
  left:8px;
}

.episode{
  bottom:8px;
  left:8px;
}

/* FLOAT */
.floating{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  background:#6366f1;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* 🔥 EXTRA DESKTOP FIX */
@media (min-width: 768px){
  .anime-grid{
    grid-template-columns: repeat(auto-fit, minmax(150px, 170px));
    justify-content:center;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo">AnimeXHub</div>
  <div>👤</div>
</header>

<div class="container">
  
  <h1>Results for <span>Anime</span></h1>
  
  <div class="anime-grid">
    
    <a href="the-summer-hikaru-died-season.html">
      <div class="card">
        <img src="the-summer-hikaru-died.jpeg" alt="The Summer Hikaru Died">
        <div class="tag">New</div>
        <div class="episode">S1-EP12</div>
      </div>
    </a>
    
    <a href="dr.stoneseason.html">
      <div class="card">
        <img src="dr.stone.jpeg" alt="">
        <div class="tag">Multi-Audio</div>
        <div class="episode">S4-EP26</div>
      </div>
    </a>
    
  </div>
  
</div>
<div class="floating">📺</div>

</body>
</html>
