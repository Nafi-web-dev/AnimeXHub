<!DOCTYPE html>
<html>

<head>
  <title>Release That Witch Episodes</title>
  
  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0b1220;
      color: white;
      text-align: center;
    }
    
    /* container */
    .container {
      max-width: 500px;
      margin: auto;
      padding: 20px;
    }
    
    /* title */
    h2 {
      color: #facc15;
    }
    
    /* BUTTON BASE */
    .btn {
      display: inline-block;
      margin: 10px 5px;
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 15px;
      transition: 0.25s ease;
    }
    
    /* WATCH */
    .watch {
      background: #C60000;
    }
    
    .watch:hover {
      background: #ff0000 !important;
      box-shadow: 0 0 15px #ff0000, 0 0 30px #ff0000;
      transform: scale(1.07);
    }
    
    /* DOWNLOAD */
    .download {
      background: #006DE4;
    }
    
    .download:hover {
      background: #0080ff !important;
      box-shadow: 0 0 15px #0080ff, 0 0 30px #0080ff;
      transform: scale(1.07);
    }
    
    /* EPISODE */
    .ep {
      padding: 18px 10px;
      border-bottom: 1px solid #1f2937;
    }
    
    .ep-title {
      font-size: 20px;
      margin-bottom: 10px;
      font-weight: bold;
    }
  </style>
  
</head>

<body>
  <div class="container">
    
    <h2>Release That Witch</h2>
    
    <a class="btn watch" href="https://www.desidubanime.me/anime/fangkai-nage-nuwu/" target="_blank" rel="noopener noreferrer">
      ▶ Watch Online
    </a>
    
    <div class="ep">
      <div class="ep-title">Episode 1</div>
      <a class="btn download" href="https://hubcloud.foo/drive/hdxains0h05d1ld" target="_blank" rel="noopener noreferrer">Download</a>
    </div>
    <div class="ep">
      <div class="ep-title">Episode 2</div>
      <a class="btn download" href="https://hubcloud.foo/drive/1f3pfd7ed6pkal3" target="_blank" rel="noopener noreferrer">Download</a>
    </div>
    <div class="ep">
      <div class="ep-title">Episode 3</div>
      <a class="btn download" href="https://hubcloud.foo/drive/rpnq7b4rnok2rr1" target="_blank" rel="noopener noreferrer">Download</a>
    </div>
    <div class="ep">
      <div class="ep-title">Episode 4</div>
      <a class="btn download" href="https://hubcloud.foo/drive/juoweefvibv25l8" target="_blank" rel="noopener noreferrer">Download</a>
    </div>
  </div>
</body>

</html>
