<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search Results</title>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, sans-serif;
    }
    
    body {
      background: #0b1220;
      color: white;
    }
    
    header {
      padding: 15px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
      text-align: center;
    }
    
    header h2 {
      color: #facc15;
    }
    
    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }
    
    .anime-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 160px));
      gap: 15px;
      justify-content: center;
    }
    
    .card {
      border: 1.5px solid #facc15;
      border-radius: 12px;
      overflow: hidden;
      background: #111827;
    }
    
    .card img {
      width: 100%;
      height: 240px;
      object-fit: cover;
    }
    
    .name {
      text-align: center;
      padding: 8px;
      font-weight: bold;
    }
    
    a {
      text-decoration: none;
      color: inherit;
    }
  </style>
</head>

<body>
  
  <header>
    <h2>Search Results</h2>
  </header>
  
  <div class="container">
    <div id="results" class="anime-grid"></div>
  </div>
  
  <script src="anime-data.js"></script>
  
  <script>
    const q = (localStorage.getItem("animeSearch") || "").toLowerCase();
    const box = document.getElementById("results");
    
    let found = 0;
    
    animeData.forEach(anime => {
      if (anime.name.toLowerCase().includes(q)) {
        box.innerHTML += `
      <a href="${anime.link}">
        <div class="card">
          <img src="${anime.img}">
          <div class="name">${anime.name}</div>
        </div>
      </a>
    `;
        found++;
      }
    });
    
    if (found === 0) {
      box.innerHTML = "<h3>No Anime Found 😢</h3>";
    }
    
    localStorage.removeItem("animeSearch");
  </script>
  
</body>

</html>
