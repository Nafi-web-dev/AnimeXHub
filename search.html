<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search Results</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: system-ui, sans-serif;
}

body{
  background:#0b1220;
  color:white;
  animation:pageIn 0.4s ease;
}

@keyframes pageIn{
  from{opacity:0;}
  to{opacity:1;}
}

/* HEADER */
header{
  padding:12px 20px;
  background:#020617;
  border-bottom:1px solid #1f2937;
}

header h2{
  color:#facc15;
}

/* GRID */
.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.anime-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(140px,160px));
  gap:15px;
  justify-content:center;
}

/* CARD WRAP */
.card-wrap{
  position:relative;
}

/* CARD */
.card{
  border:1.5px solid #facc15;
  border-radius:12px;
  overflow:hidden;
  background:#111827;
  transition:0.15s;
  position:relative;
}

.card:active{
  transform:scale(0.96);
}

.card img{
  width:100%;
  height:240px;
  object-fit:cover;
}

/* NAME (OUTSIDE CARD) */
.name{
  text-align:center;
  padding:7px;
  font-weight:bold;
  font-size:15px;
}

/* TAG (TOP LEFT) */
.tag{
  position:absolute;
  top:8px;
  left:8px;
  background:#facc15;
  color:black;
  font-size:10px;
  padding:3px 6px;
  border-radius:6px;
  font-weight:bold;
}

/* EP (BOTTOM LEFT) */
.ep{
  position:absolute;
  bottom:8px;
  left:8px;
  background:#facc15;
  color:#000;
  font-size:10px;
  padding:3px 6px;
  border-radius:6px;
  font-weight:bold;
}

/* NO RESULT */
.no-result{
  text-align:center;
  margin-top:40px;
  color:#f87171;
  font-size:18px;
}
a{
  text-decoration:none;
  color:inherit;
}
</style>
</head>

<body>

<header>
  <h2>Search Results</h2>
</header>

<div class="container">
  <div id="results" class="anime-grid"></div>
</div>

<script src="anime-data.js"></script>

<script>

const query = (localStorage.getItem("animeSearch") || "").toLowerCase();
const box = document.getElementById("results");

let found = 0;

animeData.forEach(anime => {
  if(anime.name.toLowerCase().includes(query)){
    
    box.innerHTML += `
      <div class="card-wrap">
        <a href="${anime.link}">
          <div class="card">
            <img src="${anime.img}">
            <div class="tag">${anime.tag || "Anime"}</div>
            <div class="ep">${anime.ep || ""}</div>
          </div>
        </a>
        <div class="name">${anime.name}</div>
      </div>
    `;
    
    found++;
  }
});

/* NO RESULT */
if(found === 0){
  box.innerHTML = `<div class="no-result">No Anime Found 😢</div>`;
}

/* CLEAR SEARCH */
localStorage.removeItem("animeSearch");

</script>

</body>
</html>
